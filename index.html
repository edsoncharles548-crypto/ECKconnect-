<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECKconnect</title> 
<link rel="manifest" href="manifest.json"> 
<link rel="apple-touch-icon" href="logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#0D1B3E;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.splash{text-align:center;padding:40px 24px;}
.logo{width:200px;margin-bottom:20px;}
.title{font-size:36px;font-weight:900;background:linear-gradient(135deg,#FF6B6B,#FF8C00,#FFD700,#00C853,#1565C0,#8E24AA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.sub{font-size:13px;color:#9090C0;margin-bottom:4px;}
.langs{display:flex;gap:8px;justify-content:center;margin:16px 0 28px;}
.lang{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid;}
.l1{border-color:#FF6B6B;color:#FF6B6B;}
.l2{border-color:#00C853;color:#00C853;}
.l3{border-color:#6699FF;color:#6699FF;}
.btn{display:block;width:100%;max-width:320px;margin:0 auto 12px;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:800;cursor:pointer;}
.btn1{background:linear-gradient(135deg,#FF6B6B,#FF8C00,#FFD700,#00C853,#1565C0,#8E24AA);color:white;}
.btn2{background:transparent;border:2px solid #8E24AA !important;color:white;}
.footer{font-size:11px;color:#7070A0;margin-top:16px;}
</style>
</head>
<body>
<div class="splash">
  <img class="logo" src="https://i.imgur.com/placeholder.png" 
  onerror="this.style.display='none'" alt="ECKconnect">
  <div class="title">ECKconnect 🏠</div>
  <div class="sub">Find your home — directly from the owner</div>
  <div class="sub">Pata nyumba — moja kwa moja na mwenye</div>
  <div class="sub">Trouvez votre maison — sans agents</div>
  <div class="langs">
    <span class="lang l1">🇬🇧 EN</span>
    <span class="lang l2">🇹🇿 SW</span>
    <span class="lang l3">🇫🇷 FR</span>
  </div>
  <button class="btn btn1">🔑 Login / Ingia</button>
  <button class="btn btn2">📝 Register / Jisajili</button>
  <div class="footer">No agents • No fees • Dar es Salaam 🇹🇿</div>
</div>
</body>
</html>
